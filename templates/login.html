{% extends "base.html" %}

{% block title %}Login - Cloud Security Dashboard{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg" style="margin-top: 3rem;">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <h2 class="mb-3">🔐 Login</h2>
                    <p class="text-muted">Access your security dashboard</p>
                </div>

                <form method="POST" novalidate>
                    <div class="mb-3">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Enter your username" required>
                    </div>

                    <div class="mb-3">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Enter your password" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mb-3">Login</button>
                </form>

                <a href="/" class="btn btn-light w-100 mt-3">Back to Home</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
